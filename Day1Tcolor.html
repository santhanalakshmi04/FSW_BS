<html>
    <head>
        <title>Text color Bs</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </head>

    <body >

        <h1>Bootstrap Text Color </h1>

        <div class ="container mt-5">
        <p class ="text-primary">This is Blue Color - primary</p>
        <p class ="text-secondary">This is Gray Color - secondary</p>
        <p class ="text-sucess">This is Green Color - success</p>
        <p class ="text-danger">This is red Color - danger</p>
        <p class ="text-warning">This is yellow Color - warning</p>
        <p class ="text-info">This is Light blue Color - info</p>
        <p class ="text-dark">This is Black Color - dark</p>
        <p class ="text-light">This is Light Color - light</p>
        <p class ="text-muted">This is Gray Color - muted</p>
        </div>

    </body>
</html>
