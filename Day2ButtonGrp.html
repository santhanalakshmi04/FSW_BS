<html>
    <head>
        <title>Background color Bs</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </head>

    <body class ="container mt-3">
        <h1>Button Group</h1>
        <div class ="btn-group">
            <button class ="btn btn-primary">Left</button>
            <button class ="btn btn-primary">Middle</button>
            <button class ="btn btn-primary">Right</button>
        </div><br><br>

        <h1>Colour Button Group</h1>
        <div class ="btn-group">
            <button class ="btn btn-success">Save</button>
            <button class ="btn btn-warning">Edit</button>
            <button class ="btn btn-danger">Delete</button>
        </div><br><br>

         <h1>Large and small Button Group</h1>
         <div class="btn-group btn-group-lg">
            <button class ="btn btn-primary">Large1</button>
            <button class ="btn btn-primary">Large2</button>
         </div><br><br>

         <div class="btn-group btn-group-sm">
            <button class ="btn btn-success">Small1</button>
            <button class ="btn btn-success">Small2</button>
         </div><br><br>

         <h1>Vertical Button Group</h1>
         <div class ="btn-group-vertical">
         <button class ="btn btn-primary">Home</button>
         <button class ="btn btn-success">Profile</button>
         <button class ="btn btn-danger">Logout</button>

         </div><br><br>

         <h1>Outline Button Group</h1>
         <div class ="btn-group-vertical">
         <button class ="btn btn-outline-primary">HTML</button>
         <button class ="btn btn-outline-success">CSS</button>
         <button class ="btn btn-outline-danger">JavaScript</button>

         </div><br><br>

         <h1>Music Player Controls</h1>
         <div class ="btn-toolbar justify-content-center">
            <div class ="btn-group me-3">
                <button class ="btn btn-danger">
                    <i class="bi bi-skip-backward-btn-fill"></i>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-skip-backward-btn-fill" viewBox="0 0 16 16">
  <path d="M0 12V4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2m11.21-6.907L8.5 7.028V5.5a.5.5 0 0 0-.79-.407L5 7.028V5.5a.5.5 0 0 0-1 0v5a.5.5 0 0 0 1 0V8.972l2.71 1.935a.5.5 0 0 0 .79-.407V8.972l2.71 1.935A.5.5 0 0 0 12 10.5v-5a.5.5 0 0 0-.79-.407"/>
</svg>
                </button>
                <button class ="btn btn-success">
                    <i class="bi bi-play-fill"></i>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-play-fill" viewBox="0 0 16 16">
  <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393"/>
</svg>
                </button>

                 <button class ="btn btn-primary">
                    <i class="bi bi-skip-forward-fill"></i>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-skip-forward-fill" viewBox="0 0 16 16">
  <path d="M15.5 3.5a.5.5 0 0 1 .5.5v8a.5.5 0 0 1-1 0V8.753l-6.267 3.636c-.54.313-1.233-.066-1.233-.697v-2.94l-6.267 3.636C.693 12.703 0 12.324 0 11.693V4.308c0-.63.693-1.01 1.233-.696L7.5 7.248v-2.94c0-.63.693-1.01 1.233-.696L15 7.248V4a.5.5 0 0 1 .5-.5"/>
</svg>
                </button>
            </div>

            <div class = "btn-group">
                <button class ="btn btn-dark">
                    <i class = "bi bi-volume-up-fill"></i>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-volume-up-fill" viewBox="0 0 16 16">
  <path d="M11.536 14.01A8.47 8.47 0 0 0 14.026 8a8.47 8.47 0 0 0-2.49-6.01l-.708.707A7.48 7.48 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303z"/>
  <path d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.48 5.48 0 0 1 11.025 8a5.48 5.48 0 0 1-1.61 3.89z"/>
  <path d="M8.707 11.182A4.5 4.5 0 0 0 10.025 8a4.5 4.5 0 0 0-1.318-3.182L8 5.525A3.5 3.5 0 0 1 9.025 8 3.5 3.5 0 0 1 8 10.475zM6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06"/>
</svg>
                </button>

                <button class ="btn btn-danger">
                    <i class ="bi bi-mic-fill"></i>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-mic-fill" viewBox="0 0 16 16">
  <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0z"/>
  <path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5"/>
</svg>
                </button>
            </div>
         </div>



       

    </body>
</html>
