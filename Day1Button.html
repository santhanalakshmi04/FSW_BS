<html>
    <head>
        <title>Button Bs</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </head>

    <body class ="container mt-5" >

        <h1>Button Colors</h1><br>

        <button class ="btn btn-primary">Primary</button>
        <button class ="btn btn-secondary">Secondary</button>
        <button class ="btn btn-success">success</button>
        <button class ="btn btn-danger">danger</button>
        <button class ="btn btn-warning">warning</button>
        <button class ="btn btn-info">info</button>
        <button class ="btn btn-dark">dark</button><br><br>

        <h1>Button sizes</h1>
        <button class ="btn btn-primary btn-lg">Large button</button>
        <button class ="btn btn-success ">Normal button</button>
        <button class ="btn btn-danger btn-sm">Small button</button>
        <br><br>

        <h1>Outline Buttons</h1>
        <button class ="btn btn-outline-primary">Primary</button>
        <button class ="btn btn-outline-danger">Danger</button>
        <br><br>

        <h1>Block Button</h1>
        <button class ="btn btn-success w-100">submit</button>
        <br><br>

        <h1>Disabled Button</h1>
        <button class ="btn btn-danger">Disabled Button</button><br><br>

        <h1>Button Icons</h1>
        <button class ="btn btn-primary">
        <i class="bi bi-bag-heart"></i>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-bag-heart" viewBox="0 0 16 16">
  <path fill-rule="evenodd" d="M10.5 3.5a2.5 2.5 0 0 0-5 0V4h5zm1 0V4H15v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V4h3.5v-.5a3.5 3.5 0 1 1 7 0M14 14V5H2v9a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1M8 7.993c1.664-1.711 5.825 1.283 0 5.132-5.825-3.85-1.664-6.843 0-5.132"/>
</svg>
        Bag Heart
        </button><br><br>

        <h1>Button Group</h1>
        <div class ="btn-grp">
            <button class ="btn btn-secondary">Left</button>
            <button class ="btn btn-secondary">Middle</button>
            <button class ="btn btn-secondary">Right</button>
        </div><br><br>

        <h1>Toolbar</h1>
        <div class ="btn-toolbar">
            <div class ="btn-group me-2">
                <button class ="btn btn-success">Login</button>
                <button class ="btn btn-success">Logout</button>
            </div>

            <div class ="btn-group">
                <button class ="btn btn-primary">Save</button>
                <button class ="btn btn-primary">Reset</button>
            </div>
            
        </div><br><br>

        <h1>Student Portal Buttons - Project Using Buttons</h1> <br>

        <div class ="d-grid gap-3"></div>
        <button class ="btn btn-primary btn-lg w-50">
            <i class ="bi bi-person"></i>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
  <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
</svg>
        Login
        </button> <br>

        <button class ="btn btn-success btn-lg w-50">
            <i class ="bi bi-person"></i>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-plus-fill" viewBox="0 0 16 16">
  <path d="M1 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
  <path fill-rule="evenodd" d="M13.5 5a.5.5 0 0 1 .5.5V7h1.5a.5.5 0 0 1 0 1H14v1.5a.5.5 0 0 1-1 0V8h-1.5a.5.5 0 0 1 0-1H13V5.5a.5.5 0 0 1 .5-.5"/>
</svg>
        Register
        </button>

         <button class ="btn btn-warning btn-lg w-50">
            <i class ="bi bi-arrow-clockwise"></i>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-clockwise" viewBox="0 0 16 16">
  <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2z"/>
  <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466"/>
</svg>
        Reset Password
        </button>

        <button class ="btn btn-danger btn-lg w-50">
            <i class ="bi bi-arrow-trash"></i>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
  <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
  <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
</svg>
        Delete Account
        </button>

        <button class ="btn btn-outline btn-lg w-50">
            <i class ="bi bi-arrow-right"></i>
           <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-down-right-circle-fill" viewBox="0 0 16 16">
  <path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m5.904-2.803a.5.5 0 1 0-.707.707L9.293 10H6.525a.5.5 0 0 0 0 1H10.5a.5.5 0 0 0 .5-.5V6.525a.5.5 0 0 0-1 0v2.768z"/>
</svg>
        Logout
        </button>

        

        


        

    </body>
</html>
